<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Copa Fedex Sucesores 2026{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css?v=9">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-logo">Copa Fedex Sucesores</a>
        <div class="nav-links">
            <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Inicio</a>
            <a href="/ranking" class="{% if request.url.path == '/ranking' %}active{% endif %}">Ranking</a>
            <a href="/fechas" class="{% if request.url.path == '/fechas' %}active{% endif %}">Fechas</a>
            <a href="/jugadores" class="{% if '/jugador' in request.url.path %}active{% endif %}">Jugadores</a>
            <a href="/reporte" class="{% if request.url.path == '/reporte' %}active{% endif %}">Reporte</a>
            <a href="/reglas" class="{% if request.url.path == '/reglas' %}active{% endif %}">Reglas</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
