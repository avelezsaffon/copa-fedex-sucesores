# fly.toml app configuration file generated for copa-fedex-sucesores on 2026-02-15T08:14:08-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'copa-fedex-sucesores'
primary_region = 'gru'

[build]

[env]
  DB_PATH = '/data/torneo.db'

[[mounts]]
  source = 'torneo_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
