name: Liquidar y Backup

on:
  push:
    paths:
      - '.github/workflows/backup-db.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  liquidar:
    name: Liquidar Fecha 5 via SSH
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Wake up the app
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://copa-fedex-sucesores.fly.dev/ || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then break; fi
            sleep 8
          done
          sleep 5

      - name: Create liquidation script
        run: |
          cat > /tmp/liquidar.py << 'SCRIPT'
          import sqlite3, sys, time
          sys.path.insert(0, '/app')

          DB = '/data/torneo.db'
          conn = sqlite3.connect(DB)
          conn.row_factory = sqlite3.Row

          SABADO = '2026-03-21'
          DOMINGO = '2026-03-22'

          print('=== RONDAS EN DB ===')
          for fecha in [SABADO, DOMINGO, '2026-03-20', '2026-03-23']:
              cnt = conn.execute("SELECT COUNT(*) c FROM rondas WHERE fecha=? AND club LIKE '%Manizales%'", (fecha,)).fetchone()[0]
              print(f'  {fecha}: {cnt} rondas en Manizales')

          rondas_finde = conn.execute("""
              SELECT r.id as ronda_id, r.jugador_id, j.nombre, j.apellido,
                     r.fecha, r.club, r.score_gross, r.tarjeta_id, r.handicap_cancha
              FROM rondas r JOIN jugadores j ON r.jugador_id = j.id
              WHERE r.fecha IN (?, ?)
              AND r.club LIKE '%Manizales%'
              AND r.score_gross IS NOT NULL
              AND r.score_gross >= 60
              ORDER BY r.jugador_id, r.fecha
          """, (SABADO, DOMINGO)).fetchall()
          rondas_finde = [dict(r) for r in rondas_finde]
          print(f'\nRondas {SABADO}/{DOMINGO}: {len(rondas_finde)}')

          if not rondas_finde:
              print('No rounds on sat/sun, trying with friday offset...')
              rondas_finde = conn.execute("""
                  SELECT r.id as ronda_id, r.jugador_id, j.nombre, j.apellido,
                         r.fecha, r.club, r.score_gross, r.tarjeta_id, r.handicap_cancha
                  FROM rondas r JOIN jugadores j ON r.jugador_id = j.id
                  WHERE r.fecha IN ('2026-03-20', ?, ?)
                  AND r.club LIKE '%Manizales%'
                  AND r.score_gross IS NOT NULL
                  AND r.score_gross >= 60
                  ORDER BY r.jugador_id, r.fecha
              """, (SABADO, DOMINGO)).fetchall()
              rondas_finde = [dict(r) for r in rondas_finde]
              print(f'With March 20 included: {len(rondas_finde)}')

          if not rondas_finde:
              print('FATAL: No rounds found')
              sys.exit(1)

          mejores = {}
          for r in rondas_finde:
              jid = r['jugador_id']
              if jid not in mejores:
                  mejores[jid] = r
              elif r['fecha'] == SABADO:
                  mejores[jid] = r

          print(f'\n{len(mejores)} jugadores:')
          for jid, r in sorted(mejores.items()):
              print(f'  {r["nombre"]} {r["apellido"]} | {r["fecha"]} | G:{r["score_gross"]} | HCP:{r["handicap_cancha"]} | t:{r["tarjeta_id"]}')

          print('\n=== Handicaps ===')
          from src.fedegolf_collector import FedegolfScoresCollector
          collector = FedegolfScoresCollector()
          for jid, r in mejores.items():
              if r['handicap_cancha'] is None and r['tarjeta_id']:
                  try:
                      detalle = collector.get_scorecard_detail(r['tarjeta_id'])
                      if detalle and detalle.get('handicap_cancha') is not None:
                          conn.execute('UPDATE rondas SET handicap_cancha=?, indice_al_momento=? WHERE id=?',
                              (detalle['handicap_cancha'], detalle.get('indice_al_momento'), r['ronda_id']))
                          r['handicap_cancha'] = detalle['handicap_cancha']
                          print(f'  {r["nombre"]} {r["apellido"]}: HCP={detalle["handicap_cancha"]}')
                      else:
                          print(f'  {r["nombre"]} {r["apellido"]}: no HCP available')
                      time.sleep(0.3)
                  except Exception as e:
                      print(f'  Error {r["nombre"]}: {e}')
          conn.commit()

          fecha_row = conn.execute('SELECT id FROM fechas_torneo WHERE fecha = ?', (SABADO,)).fetchone()
          fecha_torneo_id = fecha_row['id'] if fecha_row else conn.execute('INSERT INTO fechas_torneo (fecha) VALUES (?)', (SABADO,)).lastrowid
          conn.commit()
          print(f'\nFecha torneo ID: {fecha_torneo_id}')

          conn.execute('DELETE FROM resultados_fecha WHERE fecha_torneo_id = ?', (fecha_torneo_id,))
          for jid, r in mejores.items():
              conn.execute('INSERT INTO resultados_fecha (fecha_torneo_id, jugador_id, ronda_id, score_gross) VALUES (?, ?, ?, ?)',
                  (fecha_torneo_id, jid, r['ronda_id'], r['score_gross']))
          num = len(mejores)
          conn.execute('UPDATE fechas_torneo SET num_jugadores = ?, valida = ? WHERE id = ?', (num, num >= 2, fecha_torneo_id))
          conn.commit()
          print(f'Asignados {num} jugadores')

          from src.ranking import recalcular_fecha
          recalcular_fecha(DB, fecha_torneo_id)
          print('Recalculado!')

          results = conn.execute("""
              SELECT rf.posicion, j.nombre, j.apellido, rf.score_gross,
                     rf.handicap_aplicado, rf.score_neto, rf.puntos, r.handicap_cancha
              FROM resultados_fecha rf
              JOIN jugadores j ON rf.jugador_id = j.id
              LEFT JOIN rondas r ON rf.ronda_id = r.id
              WHERE rf.fecha_torneo_id = ?
              ORDER BY rf.posicion
          """, (fecha_torneo_id,)).fetchall()

          print(f'\n=== RESULTADOS FECHA 5 ({SABADO}) ===')
          for r in results:
              d = dict(r)
              m = 'OK' if d['handicap_aplicado'] == d['handicap_cancha'] else 'CALC'
              print(f'  {d["posicion"]:>3} | {d["nombre"]} {d["apellido"]:<25} | G:{d["score_gross"]} | HCP:{d["handicap_aplicado"]} | N:{d["score_neto"]} | Pts:{d["puntos"]} | Fed:{d["handicap_cancha"]} {m}')

          conn.close()
          print('\nDone!')
          SCRIPT
          
          ENCODED=$(base64 -w0 /tmp/liquidar.py)
          echo "LIQUIDAR_SCRIPT=$ENCODED" >> $GITHUB_ENV

      - name: Run liquidation on production
        run: |
          flyctl ssh console -a copa-fedex-sucesores -C "echo $LIQUIDAR_SCRIPT | base64 -d | python3"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          LIQUIDAR_SCRIPT: ${{ env.LIQUIDAR_SCRIPT }}

      - name: Download production DB
        run: |
          flyctl ssh console -a copa-fedex-sucesores -C "cat /data/torneo.db" > data/torneo_prod.db
          ls -la data/torneo_prod.db
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Export backup JSONs
        run: |
          python3 << 'PYEOF'
          import sqlite3, json
          conn = sqlite3.connect('data/torneo_prod.db')
          conn.row_factory = sqlite3.Row
          tablas = ['jugadores', 'rondas', 'fechas_torneo', 'resultados_fecha', 'tabla_puntos']
          for tabla in tablas:
              rows = [dict(r) for r in conn.execute(f'SELECT * FROM {tabla}').fetchall()]
              with open(f'data/backup/{tabla}.json', 'w') as f:
                  json.dump(rows, f, indent=2, ensure_ascii=False)
              print(f'{tabla}: {len(rows)} registros exportados')
          conn.close()
          PYEOF

      - name: Show results
        run: |
          python3 << 'PYEOF'
          import sqlite3
          conn = sqlite3.connect('data/torneo_prod.db')
          conn.row_factory = sqlite3.Row
          print('=== FECHAS TORNEO ===')
          for ft in conn.execute('SELECT * FROM fechas_torneo WHERE num_jugadores > 0 ORDER BY fecha').fetchall():
              d = dict(ft)
              print(f'  {d["fecha"]} | ID:{d["id"]} | Jugadores:{d["num_jugadores"]} | Valida:{d["valida"]}')
          ft = conn.execute("SELECT * FROM fechas_torneo WHERE fecha = '2026-03-21'").fetchone()
          if ft:
              print(f'\n=== RESULTADOS FECHA 5 ===')
              results = conn.execute('SELECT rf.posicion, j.nombre, j.apellido, rf.score_gross, rf.handicap_aplicado, rf.score_neto, rf.puntos FROM resultados_fecha rf JOIN jugadores j ON rf.jugador_id = j.id WHERE rf.fecha_torneo_id = ? ORDER BY rf.posicion', (dict(ft)['id'],)).fetchall()
              for r in results:
                  d = dict(r)
                  print(f'  {d["posicion"]:>3} | {d["nombre"]} {d["apellido"]:<25} | G:{d["score_gross"]} HCP:{d["handicap_aplicado"]} N:{d["score_neto"]} Pts:{d["puntos"]}')
          PYEOF

      - name: Upload backups as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backups
          path: data/backup/

      - name: Commit and push backups
        run: |
          git config user.name "Claude"
          git config user.email "noreply@anthropic.com"
          git pull --rebase origin main || true
          git add data/backup/
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "Backup DB - Fecha 5 liquidada (2026-03-21)"
            git push origin main
          )
